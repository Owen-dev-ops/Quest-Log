<!DOCTYPE HTML>

<html lang="en">
    <head>
        <!-- Use UTF-8 for character encoding. -->
        <meta charset = "UTF-8">

        <!-- Auto adjust viewport width depending on device. -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- CSS Sheet and Bootstrap Links. -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

        <!-- Set Font -->
        <!-- Cinzel Decorative, Google Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap">

        <!-- Set Favicon -->
        <link rel="icon" href="{{ url_for('static', filename='images/travel_journal_favicon.png') }}" type="image/png", sizes="32x32"> 

        <title> Quest Log {% block title %}{% endblock %}</title>
    </head>

    <body>
        <header></header>

        <main>    
            {% with messages = get_flashed_messages(with_categories="true") %}
                {% if messages %}
                    <ul>
                        {% for category, message in messages %}
                            <li class="{{ category }}">{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            {% block main %}

            {% endblock %}    
        </main>

        <footer></footer>

        
        <!-- Bootstrap JavaScript Link -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        {% block scripts %}{% endblock %}
    </body>
</html>
