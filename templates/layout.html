<!DOCTYPE HTML>

<html lang="en">
    <head>
        <!-- Use UTF-8 for character encoding. -->
        <meta charset = "UTF-8">

        <!-- Auto adjust viewport width depending on device. -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Fonts -->
        <!-- Cinzel, Google Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Port+Lligat+Sans&display=swap" rel="stylesheet">

        <!-- Port Lligat Sans, Google Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Port+Lligat+Sans&display=swap" rel="stylesheet">


        <!-- CSS Sheet, Bootstrap, and Font Awesome Links. -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

        <!-- Set Favicon -->
        <link rel="icon" href="{{ url_for('static', filename='images/travel_journal_favicon.png') }}" type="image/png", sizes="32x32"> 

        <title> Quest Log {% block title %}{% endblock %}</title>
    </head>

    <body>
        <header></header>

        <main>    
            {% with messages = get_flashed_messages(with_categories="true") %}
                {% if messages %}
                    <ul>
                        {% for category, message in messages %}
                            <li class="{{ category }}">{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            {% block main %}

            {% endblock %}    
        </main>

        <footer></footer>

        
        <!-- JavaScript Links -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="{{ url_for('static', filename='main.js') }}"></script>
        {% block scripts %}{% endblock %}
    </body>
</html>
